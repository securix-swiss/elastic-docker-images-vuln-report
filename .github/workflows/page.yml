name: Build CVE report

on:
  push:
    branches:
      - main
  schedule:
    - cron: '5 4 * * 3'
    - cron: '54 9 * * 1'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      MS_TEAMS_WEBHOOK_URL: ${{ secrets.MS_TEAMS_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Download Trivy
        run: |
          TRIVY_VERSION="0.70.0"
          TRIVY_TAG="v${TRIVY_VERSION}"
          TRIVY_ASSET="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          TRIVY_BASE_URL="https://github.com/aquasecurity/trivy/releases/download/${TRIVY_TAG}"

          curl -sSL "${TRIVY_BASE_URL}/${TRIVY_ASSET}" -o trivy.tar.gz
          curl -sSL "${TRIVY_BASE_URL}/${TRIVY_ASSET}.sigstore.json" -o trivy.tar.gz.sigstore.json

          cosign verify-blob-attestation trivy.tar.gz \
            --bundle trivy.tar.gz.sigstore.json \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity "https://github.com/aquasecurity/trivy/.github/workflows/reusable-release.yaml@refs/tags/${TRIVY_TAG}"

          tar -xzf trivy.tar.gz
          chmod +x trivy

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install -r data/requirements.txt

      - name: Get trivy data
        run: cd data/ && TRIVY_CMD="../trivy" python run.py

      - name: Notify about new CVEs in MS Teams
        if: ${{ env.MS_TEAMS_WEBHOOK_URL != '' }}
        run: python data/notify_new_cves.py --webhook-url "$MS_TEAMS_WEBHOOK_URL"

      - name: Set up Yarn
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies and build with Yarn
        run: |
          yarn install
          yarn build
          mkdir -p out/json
          cp data/results/*.json out/json/.

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
